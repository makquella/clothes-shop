<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="100%" stop-color="#000" />
    </radialGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- X-Ray Glitch Filter -->
    <filter id="glitch">
      <feOffset dx="6" dy="-6" result="blueShift" />
      <feComponentTransfer in="blueShift" result="blueShiftColor">
        <feFuncR type="linear" slope="0" />
        <feFuncG type="linear" slope="0.7" />
        <feFuncB type="linear" slope="1" />
      </feComponentTransfer>
      <feOffset in="SourceGraphic" dx="-6" dy="6" result="redShift" />
      <feComponentTransfer in="redShift" result="redShiftColor">
        <feFuncR type="linear" slope="1" />
        <feFuncG type="linear" slope="0" />
        <feFuncB type="linear" slope="0" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="blueShiftColor" />
        <feMergeNode in="redShiftColor" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space brutalist background -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <g transform="translate(256, 256)">
    <!-- Distorted / Shattered Outer Frame -->
    <path 
      d="M-180,-180 L180,-180 L180,-100 M180,40 L180,180 L-180,180 Z" 
      fill="none" 
      stroke="#1a1a1a" 
      stroke-width="4" 
    />
    <path 
      d="M-160,-160 L160,-160 L160,-80 M160,20 L160,160 L-160,160 Z" 
      fill="none" 
      stroke="#222" 
      stroke-width="2" 
    />

    <!-- THE DECONSTRUCTED 'D' -->
    <g filter="url(#glitch)">
      <!-- Slashed Back Spine -->
      <path d="M-60,-120 L-60,120" stroke="#fff" stroke-width="24" stroke-linecap="square" />
      
      <!-- Offset Glitch Spine -->
      <path d="M-60,-120 L-60,120" stroke="#38bdf8" stroke-width="4" opacity="0.8" transform="translate(-14, 0)" />

      <!-- Segmented Curve -->
      <path d="M-50,-120 C100,-120 120,-40 120,0" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="square" />
      <path d="M120,40 C120,80 100,120 -50,120" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="square" />

      <!-- Surgical Slits cutting through -->
      <line x1="-120" y1="15" x2="160" y2="-25" stroke="#000" stroke-width="30" />
      <line x1="-120" y1="15" x2="160" y2="-25" stroke="#38bdf8" stroke-width="6" filter="url(#neon)" />
      
      <line x1="-100" y1="60" x2="100" y2="40" stroke="#000" stroke-width="20" />
      <line x1="-100" y1="60" x2="100" y2="40" stroke="#38bdf8" stroke-width="2" />
    </g>
  </g>
</svg>
